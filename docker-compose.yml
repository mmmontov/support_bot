# Two services: api (FastAPI + DB migrations) and bot (aiogram).
# Copy .env from .env.example, then: docker compose up -d --build

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: support-bot-api:local
    container_name: support-bot-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      DATABASE_URL: sqlite+aiosqlite:////data/support.db
    volumes:
      - app_data:/data
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec uvicorn support_bot.api.main:app --host 0.0.0.0 --port 8000",
      ]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    image: support-bot-bot:local
    container_name: support-bot-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  app_data:
